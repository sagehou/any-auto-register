name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare publish context
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          owner_repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${owner_repo}"

          case "${GITHUB_REF}" in
            refs/heads/main)
              is_main=true
              is_release_tag=false
              ;;
            refs/tags/v[0-9]*.[0-9]*.[0-9]*)
              if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                is_main=false
                is_release_tag=true
              else
                echo "Unsupported tag ref: ${GITHUB_REF}" >&2
                exit 1
              fi
              ;;
            *)
              echo "Publishing is only allowed from main or stable semver tags. Ref: ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac

          {
            echo "image=${image}"
            echo "is_main=${is_main}"
            echo "is_release_tag=${is_release_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ steps.prep.outputs.is_main == 'true' }}
            type=raw,value=${{ github.ref_name }},enable=${{ steps.prep.outputs.is_release_tag == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.prep.outputs.is_release_tag == 'true' }}
            type=semver,pattern={{major}},enable=${{ steps.prep.outputs.is_release_tag == 'true' && !startsWith(github.ref_name, 'v0.') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
